workflows:
  android-workflow:
    name: Android Build
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Clean build
        script: |
          flutter clean
          flutter pub get
      - name: Build Android AAB
        script: |
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/**/*.aab
      - build/app/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - jageshwarverma777@gmail.com

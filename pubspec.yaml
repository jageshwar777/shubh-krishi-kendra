name: shubh_kriski_kendra
description: "A new Flutter project for Shubh Krishi Kendra."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # ये वो सारे ज़रूरी पैकेजेस हैं जो आपके कोड में इस्तेमाल हुए हैं:
  file_picker: ^8.0.0
  provider: ^6.1.2
  image_picker: ^1.1.2
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # आपके एसेट्स फोल्डर का रास्ता
  assets:
    - assets/images/
    - assets/data/
